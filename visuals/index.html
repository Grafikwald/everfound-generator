<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Everfound Visuals Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f3ff 0%, #f0f9ff 100%);
      min-height: 100vh;
      padding: 20px;
      color: #1a1a1a;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #528790 0%, #0f6e56 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .form-section h2 {
      font-size: 18px;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #333;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0ccc8;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #528790;
      box-shadow: 0 0 0 3px rgba(82, 135, 144, 0.1);
    }

    .checkbox-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: auto;
    }

    .checkbox-item label {
      margin: 0;
      font-weight: 400;
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #528790 0%, #0f6e56 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 1rem;
    }

    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(82, 135, 144, 0.2);
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .preview-label {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .canvas-container {
      border: 1px solid #d0ccc8;
      border-radius: 8px;
      overflow: hidden;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 350px;
    }

    #postCanvas {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .download-btn {
      padding: 12px 24px;
      background: #ffbd2e;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(255, 189, 46, 0.3);
    }

    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #999;
    }

    .variant-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .variant-btn {
      padding: 8px 16px;
      background: #f5f3f0;
      border: 1px solid #d0ccc8;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .variant-btn.active {
      background: #528790;
      color: white;
      border-color: #528790;
    }

    .variant-btn:hover {
      border-color: #528790;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Everfound Visuals Generator</h1>
      <p>LinkedIn Post Grafiken nach 8-Wochen-Plan</p>
    </div>

    <div class="content">
      <!-- Form Section -->
      <div class="form-section">
        <h2>Post erstellen</h2>

        <div class="form-group">
          <label for="headline">Content Plan Headline</label>
          <input type="text" id="headline" placeholder='z.B. "Direct Offer", "Der Zeithebel"'>
          <small style="font-size: 12px; color: #999; margin-top: 4px; display: block;">Kopiere eine Headline aus deinem Plan</small>
        </div>

        <div class="form-group">
          <label for="mainText">Haupttext (optional)</label>
          <textarea id="mainText" placeholder="Kurzer Text oder Aussage für den Post"></textarea>
        </div>

        <div class="form-group">
          <label for="subText">Untertext (optional)</label>
          <textarea id="subText" placeholder="Zusätzliche Information oder Kontext" style="min-height: 60px;"></textarea>
        </div>

        <div class="form-group">
          <label>Design Optionen</label>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="darkMode" value="dark">
              <label for="darkMode">Dark Design</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="withPhoto" value="photo">
              <label for="withPhoto">Mit Foto</label>
            </div>
          </div>
        </div>

        <div class="form-group" id="photoSelectGroup" style="display: none;">
          <label for="photoUrl">Foto URL</label>
          <input type="text" id="photoUrl" placeholder="https://drive.google.com/... oder externe URL">
          <small style="font-size: 12px; color: #999; margin-top: 4px; display: block;">Direkter Link zu deinem Foto</small>
        </div>

        <button class="generate-btn" id="generateBtn">Generiere Varianten</button>
      </div>

      <!-- Preview Section -->
      <div class="preview-section">
        <div>
          <div class="preview-label">Vorschau (1200x628px LinkedIn Format)</div>
          <div class="canvas-container">
            <canvas id="postCanvas" width="1200" height="628" style="max-width: 100%; height: auto;"></canvas>
          </div>
        </div>
        <button class="download-btn" id="downloadBtn" disabled>
          <i class="fas fa-download"></i> PNG herunterladen
        </button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'everfound_visuals_settings';
    const canvas = document.getElementById('postCanvas');
    const ctx = canvas.getContext('2d');

    // Load stored settings
    function loadSettings() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const settings = JSON.parse(stored);
        document.getElementById('darkMode').checked = settings.darkMode || false;
        document.getElementById('withPhoto').checked = settings.withPhoto || false;
      }
    }

    // Save settings
    function saveSettings() {
      const settings = {
        darkMode: document.getElementById('darkMode').checked,
        withPhoto: document.getElementById('withPhoto').checked
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    // Toggle photo input visibility
    document.getElementById('withPhoto').addEventListener('change', function() {
      document.getElementById('photoSelectGroup').style.display = this.checked ? 'block' : 'none';
      saveSettings();
    });

    document.getElementById('darkMode').addEventListener('change', saveSettings);

    // Generate canvas graphic
    function generateGraphic() {
      const headline = document.getElementById('headline').value.trim();
      const mainText = document.getElementById('mainText').value.trim();
      const subText = document.getElementById('subText').value.trim();
      const isDark = document.getElementById('darkMode').checked;
      const withPhoto = document.getElementById('withPhoto').checked;

      if (!headline) {
        alert('Bitte eine Headline eingeben');
        return;
      }

      // Clear canvas
      ctx.fillStyle = isDark ? '#1a1a1a' : '#f5f3f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid pattern
      drawGrid(isDark);

      // Set colors
      const textColor = isDark ? '#ffffff' : '#161616';
      const accentColor = '#ffbd2e';
      const bgColor = isDark ? '#1a1a1a' : '#f5f3f0';

      // Draw content
      let yPos = 80;

      // Headline
      ctx.font = 'bold 56px "Hubot Sans", Arial, sans-serif';
      ctx.fillStyle = textColor;
      ctx.lineWidth = 1.5;
      
      const headlineLines = wrapText(headline, canvas.width - 120, ctx);
      headlineLines.forEach(line => {
        ctx.fillText(line, 60, yPos);
        yPos += 70;
      });

      // Yellow accent line
      ctx.fillStyle = accentColor;
      ctx.fillRect(60, yPos + 20, 80, 8);
      yPos += 50;

      // Main text
      if (mainText) {
        ctx.font = '24px "IBM Plex Sans", Arial, sans-serif';
        ctx.fillStyle = textColor;
        const mainLines = wrapText(mainText, canvas.width - 120, ctx);
        mainLines.slice(0, 3).forEach(line => {
          ctx.fillText(line, 60, yPos);
          yPos += 40;
        });
        yPos += 20;
      }

      // Sub text
      if (subText) {
        ctx.font = '18px "IBM Plex Sans", Arial, sans-serif';
        ctx.fillStyle = isDark ? '#cccccc' : '#666666';
        const subLines = wrapText(subText, canvas.width - 120, ctx);
        subLines.slice(0, 2).forEach(line => {
          ctx.fillText(line, 60, yPos);
          yPos += 35;
        });
      }

      // Everfound logo
      ctx.font = 'bold 32px Arial, sans-serif';
      ctx.fillStyle = accentColor;
      ctx.textAlign = 'right';
      ctx.fillText('EVERFOUND', canvas.width - 60, canvas.height - 40);
      ctx.textAlign = 'left';

      // Footer
      ctx.font = '14px Arial, sans-serif';
      ctx.fillStyle = isDark ? '#999999' : '#999999';
      ctx.fillText('everfound.io', 60, canvas.height - 40);
    }

    function drawGrid(isDark) {
      ctx.strokeStyle = isDark ? '#333333' : '#e8e6e1';
      ctx.lineWidth = 1;
      const gridSize = 60;

      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function wrapText(text, maxWidth, context) {
      const words = text.split(' ');
      const lines = [];
      let currentLine = '';

      words.forEach(word => {
        const testLine = currentLine + (currentLine ? ' ' : '') + word;
        const metrics = context.measureText(testLine);
        if (metrics.width > maxWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      });

      if (currentLine) lines.push(currentLine);
      return lines;
    }

    // Generate button
    document.getElementById('generateBtn').addEventListener('click', function() {
      generateGraphic();
      document.getElementById('downloadBtn').disabled = false;
    });

    // Download button
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const link = document.createElement('a');
      link.download = 'everfound-post.png';
      link.href = canvas.toDataURL();
      link.click();
    });

    // Initialize
    loadSettings();
    generateGraphic();
  </script>
</body>
</html>
